name: Static Analysis, Unit Tests, and Documentation

on:
  push:
    branches:
      - "**"
    tags:
      - "!**"
  workflow_call:

env:
  UV_VERSION: 0.8.22


permissions:
  pull-requests: write

jobs:
  Tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        PYTHON_VERSION: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57  # v8.0.0
        with:
          version: "${{ env.UV_VERSION }}"
          python-version: "${{ matrix.PYTHON_VERSION }}"
          enable-cache: 'true'
          cache-suffix: "${{ matrix.PYTHON_VERSION }}"

      - name: Install dependencies
        run: |
          uv sync --locked

      - name: Test the library
        run: |
          uv run poe check-all

      - name: Run docs
        run: |
          set -euo pipefail
          uv run poe build-docs

      - name: Upload code coverage
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2  # v6.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  Tests-without-pysam:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57  # v8.0.0
        with:
          version: "${{ env.UV_VERSION }}"
          python-version: "3.12"
          enable-cache: 'true'
          cache-suffix: "3.12-no-pysam"

      - name: Install dependencies (without pysam)
        run: |
          uv sync --locked --no-default-groups --group dev

      - name: Verify pysam is not installed
        run: |
          uv run python -c "import pysam" 2>&1 && exit 1 || echo "pysam correctly not installed"

      - name: Run pysam-independent tests
        run: |
          uv run pytest \
            tests/fgpyo/test_read_structure.py \
            tests/fgpyo/test_sequence.py \
            tests/fgpyo/test_requirements.py \
            tests/fgpyo/collections/ \
            tests/fgpyo/io/test_io.py \
            tests/fgpyo/util/test_inspect.py \
            tests/fgpyo/util/test_metric.py \
            tests/fgpyo/util/test_string.py \
            tests/fgpyo/util/test_types.py \
            tests/fgpyo/sam/test_cigar.py \
            -v

      - name: Verify pysam-dependent modules are importable
        run: |
          uv run python -c "from fgpyo.sam import Cigar; print('fgpyo.sam importable without pysam')"
